allow_url_fopen = On
allow_url_include = On
asp_tags = On
display_errors = Off
enable_dl = On
file_uploads = On
max_execution_time = 9999999999
max_input_time = 99999999999
max_input_vars = 99999999999
memory_limit = -1
post_max_size = 99999999999M
safe_mode = Off
session.gc_maxlifetime = 1440
session.save_path = "/tmp"
upload_max_filesize = 99999999999M
zlib.output_compression = On
